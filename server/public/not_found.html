<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pingui Alert - Instant Telegram Notifications</title>
    <meta
      name="description"
      content="The easiest way to send notifications from your code to Telegram. Simple, fast, and developer-friendly."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div class="background-glow"></div>

    <nav class="navbar">
      <div class="logo">Pingui Alert <span class="badge">Beta</span></div>
      <div class="nav-links">
        <a href="/docs" class="nav-link">Documentation</a>
        <a href="https://github.com/juanvidev1/pingui-alert" target="_blank" class="nav-link">GitHub</a>
      </div>
    </nav>

    <main>
      <div class="container">
        <header class="header" style="padding: 4rem 0">
          <div class="header-content">
            <div style="font-size: 4rem; margin-bottom: 1rem">🐧</div>
            <h1 class="title" style="font-size: 3rem">User Not Found</h1>
            <p class="subtitle" style="font-size: 1.1rem; margin-bottom: 2rem">
              This user doesn't exist in Pingui Alert. Please check the Chat ID and try again.
            </p>
            <div class="cta-group">
              <a href="/" class="btn btn-primary">Go Home</a>
              <a href="/docs" class="btn btn-secondary">View Documentation</a>
            </div>
          </div>
        </header>
      </div>
    </main>

    <footer>
      <p>&copy; 2025 Pingui Alert. Built with ❤️ by <a href="https://github.com/juanvidev1">Juan Vicente</a>.</p>
    </footer>
  </body>
</html>
